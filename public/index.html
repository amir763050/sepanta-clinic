<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ورود به کلینیک</title>
  <style>
    body {
      font-family: 'Tahoma', sans-serif;
      background: #f0fdf4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .box {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      width: 350px;
      text-align: center;
    }
    .icon { font-size: 60px; }
    h1 { color: #0f766e; }
    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #0d9488;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover { background: #0f766e; }
    .msg { color: red; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">🏥</div>
    <h1>کلینیک سپنتا</h1>
    <p>وارد شوید</p>

    <input type="text" id="username" placeholder="شماره تماس">
    <input type="password" id="password" placeholder="رمز عبور">
    <button onclick="login()">ورود</button>
    <div class="msg" id="message"></div>
  </div>

  <script>
    const USERS = {
      "09120000001": { name: "مدیر", pass: "admin123", role: "مدیر" },
      "09120000002": { name: "کاردرمان", pass: "staff123", role: "کاردرمان" }
    };

    function login() {
      const phone = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value.trim();
      const user = USERS[phone];

      if (user && user.pass === pass) {
        document.getElementById('message').innerHTML = `✅ خوش آمدی ${user.name} (${user.role})`;
        document.getElementById('message').style.color = 'green';
      } else {
        document.getElementById('message').innerHTML = '❌ شماره یا رمز اشتباه است';
        document.getElementById('message').style.color = 'red';
      }
    }
  </script>
</body>
</html>
